<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Card</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="clear-list.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <button class="change-yellow-color-btn">Сменить цвет карточки</button>
    <button class="change-green-all-items-btn">
      Сменить цвет всех карточек
    </button>
    <button class="open-google-btn">Открыть Google</button>
    <button class="output-console-log-btn">
      Отправить сообщение в консоль
    </button>
    <button class="change-color-btn">Меняющая свой цвет кнопка</button>

    <main class="catalog">
      <div class="container">
        <ul class="products clear-list"></ul>
        <template id="product-card-template">
          <li class="products__item card">
            <img class="card__image" />
            <p class="card__category"></p>
            <h2 class="card__name"></h2>
            <div class="card__description">
              <p></p>
            </div>
            <div class="card__compound compound">
              <span class="compound__name">состав:</span>
              <ul class="compound__list">
                <li></li>
                <li></li>
                <li></li>
              </ul>
            </div>
            <div class="card__price">
              <b>Цена</b>
              <span></span>
            </div>
          </li>
        </template>
      </div>
    </main>

    <script type="module" src="comments.js"></script>
    <script type="module" src="homework-10.js"></script>
    <script type="module" src="homework-9.js"></script>
    <script src="homework8.js"></script>
    <script src="homework7.js"></script>
    <script src="main.js"></script>
  </body>
</html>
